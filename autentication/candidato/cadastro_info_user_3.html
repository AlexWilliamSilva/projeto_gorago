<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Experiência</title>

  <link rel="stylesheet" href="../styles/cadastro_info_user_3.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >
</head>

<body>

  <div class="page-scale">

    <!-- HEADER -->
    <header class="topbar">

      <div class="back-area">

        <span class="back-icon"><a href="cadastro-pg 3.html">
          &#8592;</a>
        </span>

        <h1>Experiência</h1>

      </div>

    </header>

    <!-- PROGRESS -->
    <section class="progress-section">

      <div class="progress-top">

        <span class="step-text">
          Etapa 3 de 4
        </span>

        <span class="percent">
          75%
        </span>

      </div>

      <div class="progress-bar">

        <div class="progress-fill"></div>

      </div>

    </section>

    <!-- CONTENT -->
    <main class="content">

      <div class="form-header">

        <h2>Experiência Profissional</h2>

        <p>
          Adicione sua experiência mais recente.
        </p>

      </div>

      <!-- CARD -->
      <div class="form-card">

        <!-- CARGO -->
        <div class="input-group">

          <label>Cargo</label>

          <div class="input-field">

            <i class="fa-solid fa-briefcase"></i>

            <input
              type="text"
              placeholder="Ex: Desenvolvedor Front-end Junior"
            >

          </div>

        </div>

        <!-- EMPRESA -->
        <div class="input-group">

          <label>Empresa</label>

          <div class="input-field">

            <i class="fa-regular fa-building"></i>

            <input
              type="text"
              placeholder="Ex: Tech Solutions Ltda"
            >

          </div>

        </div>

        <!-- DATAS -->
        <div class="date-grid">

          <div class="input-group">

            <label>Mês/Ano Início</label>

            <div class="input-field center">

              <input
                type="text"
                placeholder="MM/AAAA"
              >

            </div>

          </div>

          <div class="input-group">

            <label>Mês/Ano Fim</label>

            <div class="input-field center">

              <input
                type="text"
                placeholder="MM/AAAA"
              >

            </div>

          </div>

        </div>

        <!-- CHECK -->
        <div class="checkbox-area">

          <input
            type="checkbox"
            id="current-job"
          >

          <label for="current-job">
            Trabalho aqui atualmente
          </label>

        </div>

      </div>

      <!-- ADD EXPERIENCE -->
      <button class="add-btn">

        <i class="fa-solid fa-plus"></i>

        Adicionar outra experiência

      </button>

      <!-- CONTINUE -->
      <button class="continue-btn">
        <a href="cadastro_info_user_4.html">
        Continuar
        </a>
        <i class="fa-solid fa-angle-right"></i>

      </button>

    </main>

  </div>

</body>
</html>
