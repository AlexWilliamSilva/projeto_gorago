<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Criar Conta - Experiência</title>

  <link rel="stylesheet" href="../styles/cadastro_info_user.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >
</head>

<body>

  <!-- BOTÃO VOLTAR PADRONIZADO: Mesma posição externa e estrutura de imagem -->
  <a href="cadastro_info_user_2.html" class="btn-voltar">
    <img src="../imagens/icons_nav/voltar.svg" alt="Voltar para a etapa anterior">
  </a>

  <div class="page-scale">

    <!-- HEADER -->
    <header class="topbar">
      <div class="back-area">
        <h1>Criar Conta</h1>
      </div>
    </header>

    <!-- PROGRESS -->
    <section class="progress-section">
      <div class="progress-top">
        <span class="step-text">Etapa 3 de 4</span>
        <span class="percent">75%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 75%;"></div>
      </div>
    </section>

    <!-- FORM -->
    <main class="content">

      <div class="form-header">
        <h2>Experiência Profissional</h2>
        <p>Adicione sua experiência mais recente.</p>
      </div>

      <div class="form-card">

        <!-- CARGO -->
        <div class="input-group">
          <label>Cargo</label>
          <div class="input-field">
            <i class="fa-solid fa-briefcase"></i>
            <input type="text" placeholder="Ex: Desenvolvedor Front-end Junior">
          </div>
        </div>

        <!-- EMPRESA -->
        <div class="input-group">
          <label>Empresa</label>
          <div class="input-field">
            <i class="fa-regular fa-building"></i>
            <input type="text" placeholder="Ex: Tech Solutions Ltda">
          </div>
        </div>

        <!-- DATAS -->
        <div class="date-grid" style="display: flex; gap: 20px; width: 100%;">

          <div class="input-group" style="flex: 1;">
            <label>Mês/Ano Início</label>
            <div class="input-field">
              <i class="fa-regular fa-calendar"></i>
              <input type="date" placeholder="MM/AAAA">
            </div>
          </div>

          <div class="input-group" style="flex: 1;">
            <label>Mês/Ano Fim</label>
            <div class="input-field">
              <i class="fa-regular fa-calendar-check"></i>
              <input type="date" placeholder="MM/AAAA">
            </div>
          </div>

        </div>

        <!-- CHECKBOX CUSTOMIZADO -->
        <div class="checkbox-area">
          <input type="checkbox" id="current-job">
          <label for="current-job" class="checkbox-label">
            <span>Trabalho aqui atualmente</span>
          </label>
        </div>

      </div>

      <!-- BOTÃO ADICIONAR OUTRA EXPERIÊNCIA PADRONIZADO -->
      <button type="button" class="add-btn">
        <i class="fa-solid fa-plus"></i>
        <span>Adicionar outra experiência</span>
      </button>

      <!-- BUTTON CONTINUAR PADRONIZADO -->
      <button class="continue-btn">
        <a href="cadastro_info_user_4.html">
          <span>Continuar</span>
          <i class="fa-solid fa-angle-right"></i>
        </a>
      </button>

    </main>

  </div>

</body>
</html>
