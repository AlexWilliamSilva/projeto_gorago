<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login - GoraGO</title>

  <link rel="stylesheet" href="../styles/login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

   <!-- BOTÃO VOLTAR CORRIGIDO: Fora da escala e com os caminhos corretos de pastas -->
   <a href="../../index.php" class="btn-voltar">
    <img src="../imagens/icons_nav/voltar.svg" alt="Voltar para a página inicial">
   </a>

  <div class="page-scale">

    <main class="login-container">
      <!-- LOGO -->
      <section class="left-side">

        <div class="logo-area">

          <img src="../imagens/logo.png" alt="Logo GoraGO" class="logo-image">

          <p>
            Seu próximo passo profissional começa aqui.
          </p>

        </div>

      </section>

      <!-- FORM -->
      <section class="right-side">

        <form class="login-form">

          <!-- EMAIL -->
          <div class="input-group">

            <label>E-mail</label>

            <div class="input-field">

              <i class="fa-regular fa-envelope"></i>

              <input type="email" placeholder="seu@email.com">

            </div>

          </div>

          <!-- SENHA -->
          <div class="input-group">

            <label>Senha</label>

            <div class="input-field">

              <i class="fa-solid fa-lock"></i>

              <input type="password" placeholder="••••••••">

            </div>

          </div>

          <!-- ESQUECEU -->
          <div class="forgot-password">
            <a href="#">Esqueceu a senha?</a>
          </div>

          <!-- BOTÃO -->
          <button class="login-btn"><a href="logar.html">
              Entrar</a>
          </button>

          <!-- DIVIDER -->
          <div class="divider">

            <div class="line"></div>

            <span>OU</span>

            <div class="line"></div>

          </div>

          <!-- CREATE ACCOUNT -->
          <button class="create-account-btn"> <a href="cadastro_info_user.html">
              Criar nova conta</a>
          </button>

        </form>

      </section>

    </main>

  </div>

</body>

</html>
