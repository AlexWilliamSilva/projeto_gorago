<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Formação</title>

  <link rel="stylesheet" href="../styles/cadastro_info_user_2.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >
</head>

<body>

  <div class="page-scale">

    <!-- HEADER -->
    <header class="topbar">

      <div class="back-area">

        <span class="back-icon"><a href="cadastro-pg 2.html">
          &#8592;</a>
        </span>

        <h1>Formação</h1>

      </div>

    </header>

    <!-- PROGRESS -->
    <section class="progress-section">

      <div class="progress-top">

        <span class="step-text">
          Etapa 2 de 4
        </span>

        <span class="percent">
          50%
        </span>

      </div>

      <div class="progress-bar">

        <div class="progress-fill"></div>

      </div>

    </section>

    <!-- CONTENT -->
    <main class="content">

      <div class="form-header">

        <h2>Formação Acadêmica</h2>

        <p>
          Qual seu grau de escolaridade atual?
        </p>

      </div>

      <!-- CARD -->
      <div class="form-card">

        <!-- NIVEL -->
        <div class="input-group">

          <label>Nível de Formação</label>

          <div class="input-field">

            <input type="text">

          </div>

        </div>

        <!-- CURSO -->
        <div class="input-group">

          <label>Nome do Curso</label>

          <div class="input-field">

            <i class="fa-regular fa-bookmark"></i>

            <input
              type="text"
              placeholder="Ex: Ciência da Computação"
            >

          </div>

        </div>

        <!-- INSTITUIÇÃO -->
        <div class="input-group">

          <label>Instituição de Ensino</label>

          <div class="input-field">

            <i class="fa-regular fa-building"></i>

            <input
              type="text"
              placeholder="Ex: Universidade XYZ"
            >

          </div>

        </div>

        <!-- SITUAÇÃO -->
        <div class="input-group">

          <label>Situação</label>

          <div class="status-buttons">

            <button class="status-btn active">
              Cursando
            </button>

            <button class="status-btn">
              Concluído
            </button>

          </div>

        </div>

      </div>

      <!-- BUTTON -->
      <button class="continue-btn">
        <a href="cadastro_info_user_3.html">
        Continuar
        </a>
        <i class="fa-solid fa-angle-right"></i>

      </button>

    </main>

  </div>

</body>
</html>
