<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Criar Conta - Formação</title>

  <link rel="stylesheet" href="../styles/cadastro_info_user.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <!-- BOTÃO VOLTAR PADRONIZADO: Mesma posição externa e estrutura de imagem -->
  <a href="cadastro_info_user.html" class="btn-voltar">
    <img src="../imagens/icons_nav/voltar.svg" alt="Voltar para a etapa anterior">
  </a>

  <div class="page-scale">

    <!-- HEADER -->
    <header class="topbar">
      <div class="back-area">
        <h1>Criar Conta</h1>
      </div>
    </header>

    <!-- PROGRESS -->
    <section class="progress-section">
      <div class="progress-top">
        <span class="step-text">Etapa 2 de 4</span>
        <span class="percent">50%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 50%;"></div>
      </div>
    </section>

    <!-- FORM -->
    <main class="content">

      <div class="form-header">
        <h2>Formação Acadêmica</h2>
        <p>Qual seu grau de escolaridade atual?</p>
      </div>

      <div class="form-card">

        <!-- NIVEL -->
        <div class="input-group">
          <label>Nível de Formação</label>
          <div class="input-field">
            <i class="fa-solid fa-graduation-cap"></i>
            <input type="text" placeholder="Ex: Ensino Superior">
          </div>
        </div>

        <!-- CURSO -->
        <div class="input-group">
          <label>Nome do Curso</label>
          <div class="input-field">
            <i class="fa-regular fa-bookmark"></i>
            <input type="text" placeholder="Ex: Ciência da Computação">
          </div>
        </div>

        <!-- INSTITUIÇÃO -->
        <div class="input-group">
          <label>Instituição de Ensino</label>
          <div class="input-field">
            <i class="fa-regular fa-building"></i>
            <input type="text" placeholder="Ex: Universidade XYZ">
          </div>
        </div>

        <!-- SITUAÇÃO -->
        <div class="input-group">
  <label>Situação</label>
  <div class="status-buttons">
    
    <!-- Opção 1: Cursando -->
    <input type="radio" id="cursando" name="situacao_opcao" value="cursando" checked>
    <label for="cursando" class="status-btn">Cursando</label>

    <!-- Opção 2: Concluído -->
    <input type="radio" id="concluido" name="situacao_opcao" value="concluido">
    <label for="concluido" class="status-btn">Concluído</label>

  </div>
</div>

      </div>

      <!-- BUTTON CONTINUAR PADRONIZADO -->
      <button class="continue-btn">
        <a href="cadastro_experiencia.html">
          <span>Continuar</span>
          <i class="fa-solid fa-angle-right"></i>
        </a>
      </button>

    </main>

  </div>

</body>
</html>
