<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Habilidades</title>

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../styles/cadastro_info_user_4.css">

  <!-- Ícones -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- HEADER -->
    <header class="topbar">

      <div class="back-area">

        <span class="back-icon"><a href="cadastro-pg 4.html">
          &#8592;</a>
        </span>

        <h1>Formação</h1>

      </div>

    </header>
  <!-- PROGRESSO -->
  <section class="progress-section">
    <div class="progress-info">
      <span>Etapa 4 de 4</span>
      <span>100%</span>
    </div>

    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </section>

  <!-- CONTEÚDO -->
  <main class="container">

    <div class="title-area">
      <h2>Habilidades e Cursos</h2>
      <p>Destaque o que você sabe fazer de melhor.</p>
    </div>

    <!-- CARD HABILIDADES -->
    <div class="card">

      <label>Principais Habilidades</label>

      <div class="input-box">
        <input type="text" placeholder="Ex: React, Figma, Liderança (Pressione Enter)">
      </div>

      <div class="tags">
        <span class="tag">
          React
          <i data-lucide="x"></i>
        </span>

        <span class="tag">
          TypeScript
          <i data-lucide="x"></i>
        </span>
      </div>

    </div>

    <!-- CARD CURSOS -->
    <div class="card">

      <label>Cursos Extracurriculares</label>

      <div class="input-box icon">
        <i data-lucide="badge-check"></i>
        <input type="text" placeholder="Ex: Curso Completo de Web Design">
      </div>

      <label>Instituição</label>

      <div class="input-box icon">
        <i data-lucide="building-2"></i>
        <input type="text" placeholder="Ex: Udemy">
      </div>

      <button class="add-btn">
        <i data-lucide="plus"></i>
        Adicionar certificado
      </button>

    </div>

    <!-- BOTÃO -->
    <button class="finish-btn"> <a href="cadastro_conclusao.html">
      Finalizar Cadastro</a>
    </button>

  </main>

  <script>
    lucide.createIcons();
  </script>

</body>
</html>
