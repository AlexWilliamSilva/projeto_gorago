<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Criar Conta - Dados Pessoais</title>

  <link rel="stylesheet" href="../styles/cadastro_info_user.css" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

  <div class="page-scale">

    <!-- HEADER -->
    <header class="topbar">
      <div class="back-area">
        <h1>Criar Conta</h1>
      </div>
    </header>

    <!-- PROGRESS -->
    <section class="progress-section">
      <div class="progress-top">
        <span class="step-text">Etapa 2 de 2</span>
        <span class="percent">100%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill etapa-4" style="width:100%"></div>
      </div>
    </section>


    <a href="cadastro_info_empresa.html" class="btn-voltar">
      <img src="../imagens/icons_nav/voltar.svg" alt="Voltar para a etapa anterior">
    </a>

    <!-- FORM -->
    <main class="content">

      <div class="form-header">
        <h2>Informações</h2>
        <p>Informações para o perfil da empresa</p>
      </div>

      <div class="form-card">

        <!-- NOME SOCIAL -->
        <div class="input-group">
          <label>Nome Social</label>
          <div class="input-field">
            <i class="fa-regular fa-user"></i>
            <input type="text" placeholder="Ex: TechCorp LTDA">
          </div>
        </div>

        <!-- CNPJ -->
        <div class="input-group">
          <label>CNPJ</label>
          <div class="input-field">
            <i class="fa-solid fa-phone"></i>
            <input type="text" placeholder="Ex: 00.000.000/0001-00">
          </div>
        </div>

        <!-- CEP -->
        <div class="input-group">
          <label>CEP</label>
          <div class="input-field">
            <i class="fa-solid fa-location-dot"></i>
            <input type="text" placeholder="Ex: 00000-000">
          </div>
        </div>

        <!-- NUMERO ENDEREÇO -->
        <div class="input-group">
          <label>Número Endereço</label>
          <div class="input-field">
            <i class="fa-solid fa-location-dot"></i>
            <input type="text" placeholder="Ex: 123">
          </div>
        </div>

      </div>

      <!-- BUTTON CONTINUAR -->
        <a href="cadastro_conclusao_empresa.html">
      <button class="continue-btn">
          <span>Continuar</span>
          <i class="fa-solid fa-angle-right"></i>
        </a>
      </button>

    </main>
  </div>

</body>
</html>
