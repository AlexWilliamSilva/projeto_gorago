<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login Empresa - GoraGO</title>

  <link rel="stylesheet" href="../styles/login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="shortcut icon" href="../../multimidia/favicon_gorago.png" type="image/x-icon">
</head>

<body>

<!--BOTAO VOLTAR---------------------------------------------------------------------------------->
   <a href="../../index.html" class="btn-voltar">
    <img src="../imagens/icons_nav/voltar.svg" alt="Voltar para a página inicial">
   </a>

  <div class="page-scale">

    <main class="login-container">
      <!-- LOGO -->
      <section class="left-side">

        <div class="logo-area">

          <img src="../imagens/Logo.png" alt="Logo GoraGO" class="logo-image">

          <p>
            Seu próximo passo profissional começa aqui.
          </p>

        </div>

      </section>

      <!-- FORM -->
      <section class="right-side">

        <h1 class="page-title">Login Empresa</h1>

        <form class="login-form">

          <!-- EMAIL -->
          <div class="input-group">

            <label>E-mail</label>

            <div class="input-field">

              <i class="fa-regular fa-envelope"></i>

              <input type="email" placeholder="seu@email.com">

            </div>

          </div>

          <!-- SENHA -->
          <div class="input-group">

            <label>Senha</label>

            <div class="input-field">

              <i class="fa-solid fa-lock"></i>

              <input type="password" placeholder="••••••••">

            </div>
          </div>

          <!-- ESQUECEU -->
          <div class="forgot-password">
            <a href="#">Esqueceu a senha?</a>
          </div>

            <a href="../../pagina_empresa/home_empresa.html">
          <button type="button" class="login-btn">
            Entrar
          </button>
            </a>

          <!-- DIVIDER -->
          <div class="divider">

            <div class="line"></div>

            <span>OU</span>

            <div class="line"></div>

          </div>

          <!-- CREATE ACCOUNT -->
            <a href="cadastro_info_empresa.html">
          <button type="button" class="create-account-btn"> 
            Criar nova conta
          </button>
            </a>

        </form>

      </section>

    </main>

  </div>

</body>

</html>
